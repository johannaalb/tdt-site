<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<title>La télédétection aide à agir</title>

<style>

body{
font-family:Arial;
margin:0;
background:#081c33;
color:white;
}

.header{
background:#081c33;
padding:40px;
border-bottom:2px solid #0b3d5c;
}

.header-content{
display:flex;
align-items:center;
gap:25px;
max-width:1200px;
margin:auto;
}

.logo{
width:200px;
height:auto;
}

h1{
margin:0;
font-size:36px;
}

p{
color:#cbd5e1;
}

.container{
max-width:1200px;
margin:auto;
padding:40px;
}

input{
padding:10px;
width:300px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:#0f2a44;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

th{
background:#0b3d5c;
color:white;
}

td{
color:#e2e8f0;
border-bottom:1px solid #1e3a5f;
}

tr:hover{
background:#173a5e;
}

a{
color:#0b3d5c;
font-weight:bold;
text-decoration:none;
}

.filter-buttons{
margin-bottom:20px;
}

.filter-buttons button{
margin-right:10px;
padding:8px 15px;
border:none;
background:#173a5e;
color:white;
cursor:pointer;
border-radius:5px;
}

.filter-buttons button:hover{
background:#2a5c8a;
}

.filter-buttons button:hover{
background:#cfe2f3;
}

</style>

</head>

<body>

<header class="header">

<div class="header-content">

<img src="logo_tdt.png" class="logo">

<div>

<h1>Observer pour agir</h1>

<p>
Comment la télédétection permet d'observer la Terre,
extraire des indicateurs et répondre aux enjeux environnementaux
</p>

</div>

</div>

</header>

<div class="container">

<h2>Études scientifiques</h2>

<input type="text" id="search" placeholder="Rechercher..." onkeyup="searchTable()">

<div class="filter-buttons">

<button onclick="filterTheme('all')">Tous</button>
<button onclick="filterTheme('climat')">Climat</button>
<button onclick="filterTheme('deforestation')">Déforestation</button>
<button onclick="filterTheme('agriculture')">Agriculture</button>
<button onclick="filterTheme('eau')">Eau</button>
<button onclick="filterTheme('urbanisation')">Urbanisation</button>

</div>

<table>

<thead>

<tr>

<th>Enjeu</th>
<th>Sujet</th>
<th>Indicateur</th>
<th>Satellite</th>
<th>Méthode</th>
<th>Carte</th>
<th>Article</th>

</tr>

</thead>

<tbody id="data-table">

</tbody>

</table>

</div>

<script>

const sheetURL =
"https://opensheet.elk.sh/1cGMJsh_iurq9yUesWB-LMK08bUIKcGzfa3-USXW9bqw/studies"

let studies=[]

fetch(sheetURL)

.then(res => res.json())

.then(data => {

studies=data

displayStudies(data)

})

function displayStudies(data){

let table=document.getElementById("data-table")

table.innerHTML=""

data.forEach(row => {

let tr=document.createElement("tr")

tr.style.cursor="pointer"

tr.onclick = () => {
window.location.href = "study.html?sujet=" + encodeURIComponent(row.sujet)
}

tr.innerHTML=`
<td>${row.enjeu}</td>
<td>${row.sujet}</td>
<td>${row.indicateur}</td>
<td>${row.satellite}</td>
<td>${row.methode}</td>
<td><a href="${row.carte}" target="_blank">Carte</a></td>
<td><a href="${row.article}" target="_blank">Article</a></td>
`

table.appendChild(tr)

})

}

function searchTable(){

let value=document.getElementById("search").value.toLowerCase()

let filtered=studies.filter(s =>

s.sujet.toLowerCase().includes(value) ||
s.indicateur.toLowerCase().includes(value) ||
s.satellite.toLowerCase().includes(value)

)

displayStudies(filtered)

}

function filterTheme(theme){

if(theme==="all"){

displayStudies(studies)

return

}

let filtered=studies.filter(s => s.enjeu===theme)

displayStudies(filtered)

}

</script>

</body>

</html>
